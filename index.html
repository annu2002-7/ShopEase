<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">ShopEase</div>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Categories</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Hero Section -->
<section class="hero">
    <!-- Replace hero.jpg with your image -->
    <img src="product2.jpg" alt="Hero Image">

    <div class="hero-content">
        <button><a href=https://www.instagram.com/stylewithanurag?igsh=eW9pajdoa3B1ZTVy" target="_blank" class="shop-btn">
    Shop Now
</a></button>
        
    </div>
</section>

<!-- Products -->
<section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="product-card">
            <!-- Insert Product Image -->
            <img src="product.1.jpg" alt="Product">
            <h3>Wireless Headphone</h3>
            <p>*1799</p>
            <button> <a href="https://link.amazon/B08zYIx1H" target="_blank" class="cart-btn">
        Add to Cart
    </a></button>
        </div>
<div class="product-card">
            <img src="product2.jpg" alt="Product">
            <h3>Gaming Mouse</h3>
            <p>*3595</p>
            <button>  <a href="https://link.amazon/A0bLOf9vE" target="_blank" class="cart-btn">
        Add to Cart
    </a></button>
        </div>

        <div class="product-card">
            <img src="product3.jpg" alt="Product">
            <h3>smart watch </h3>
            <p>*1899</p>
            <button>  <a href="https://link.amazon/A04VXglWp" target="_blank" class="cart-btn">
        Add to Cart
    </a></button>
        </div>

        <div class="product-card">
            <img src="product4.jpg" alt="Product">
            <h3>Bluetooth Speaker</h3>
            <p>*1099</p>
            <button>  <a href="https://link.amazon/B0eZffWFz" target="_blank" class="cart-btn">
        Add to Cart
    </a></button>
        </div>

    </div>

</section>

<!-- Banner -->
<section class="offer-banner">
    <!-- Replace banner.jpg -->
    <img src="images/banner.jpg" alt="Offer Banner">
</section>

<!-- Footer -->
<footer>
    <p>© 2026 ShopEase. All Rights Reserved.</p>
</footer>

</body>
</html>
